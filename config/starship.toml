# Minimal, useful prompt
"$schema" = 'https://starship.rs/config-schema.json'

# Clean two-line format
format = """
$directory$git_branch$git_status
$nodejs${custom.dart}$package$character"""

# Directory - show last 2 folders
[directory]
truncation_length = 2
truncate_to_repo = false
style = "bold cyan"

# Git branch - simple
[git_branch]
format = "[$branch]($style) "
style = "bold purple"

# Git status - clear counts
[git_status]
format = '([$all_status$ahead_behind]($style))'
style = "bold yellow"
ahead = "[↑$count](bold green) "
behind = "[↓$count](bold red) "
diverged = "[↑$ahead_count](bold green)[↓$behind_count](bold red) "
conflicted = "[!$count](bold red) "
untracked = ""
stashed = ""
modified = "[~$count](bold yellow) "
staged = "[+$count](bold green) "
deleted = "[-$count](bold red) "

# Prompt character
[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

# Node.js
[nodejs]
format = "[$symbol$version]($style) "
symbol = "node "
style = "bold green"
detect_files = ["package.json", ".nvmrc"]

# Dart/Flutter - disabled in favor of custom command
[dart]
disabled = true

# Custom Dart version that respects FVM
[custom.dart]
command = """
if [ -f .fvmrc ] && command -v fvm >/dev/null 2>&1; then
  fvm dart --version 2>/dev/null | grep -oE 'Dart SDK version: [0-9]+\\.[0-9]+\\.[0-9]+' | cut -d' ' -f4
elif command -v dart >/dev/null 2>&1; then
  dart --version 2>/dev/null | grep -oE 'Dart SDK version: [0-9]+\\.[0-9]+\\.[0-9]+' | cut -d' ' -f4
fi
"""
when = 'test -f pubspec.yaml'
symbol = "dart "
style = "bold blue"
format = "[$symbol v$output]($style) "

# Package version
[package]
format = "[$symbol$version]($style) "
symbol = ""
style = "bold 208"

# Disable the rest
[cmd_duration]
disabled = true

[python]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[gcloud]
disabled = true

[aws]
disabled = true
